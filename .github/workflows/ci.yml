name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npx jest --ci

  # Applies the real migrations to real Postgres on every PR, with a CI-only
  # stub for Supabase's auth schema — schema/RLS/RPC SQL is always known-good.
  schema:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
        ports:
          - 5432:5432
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Apply auth stub (CI only)
        run: psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f supabase/ci/stub-auth.sql
      - name: Apply migrations
        run: |
          for f in supabase/migrations/*.sql; do
            echo "== $f"
            psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Smoke the RPC surface
        run: |
          psql -h localhost -U postgres -v ON_ERROR_STOP=1 <<'SQL'
          -- a signed-in user creates a trip and re-joins idempotently
          insert into auth.users (id) values ('00000000-0000-0000-0000-000000000001');
          set request.jwt.claim.sub = '00000000-0000-0000-0000-000000000001';
          select create_trip('CI smoke', 'mall', 120, 'Food Court', 40.75, -74.0);
          do $$
          declare v_code text;
          begin
            select join_code into v_code from public.trips limit 1;
            perform join_trip(v_code); -- idempotent for existing member
          end $$;
          select complete_expired_trips();
          SQL
